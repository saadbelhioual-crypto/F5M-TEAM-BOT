<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F5M Bot Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 50%, #0f0f2a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 165, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff6a00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #00d4ff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #7b2ff7;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff6a00;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7b2ff7, #ff6a00);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(123, 47, 247, 0.4);
        }

        .admin-panel {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s;
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(123, 47, 247, 0.3);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff6a00;
        }

        .warning {
            background: rgba(255, 106, 0, 0.2);
            border: 1px solid #ff6a00;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            color: #ff6a00;
            font-size: 14px;
        }

        .success {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            animation: slideIn 0.3s;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        h3 {
            color: #00d4ff;
            margin-bottom: 15px;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff0000, #7b2ff7);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🎮 F5M Bot Control Panel</h1>
        
        <div id="loginSection">
            <div class="input-group">
                <label>🔐 Admin Code</label>
                <input type="password" id="adminCode" placeholder="أدخل كود المشرف">
            </div>
            <button onclick="verifyAdmin()">🚀 دخول</button>
        </div>

        <div id="adminPanel" class="admin-panel">
            <div class="card">
                <h3>📊 إحصائيات البوت</h3>
                <div class="stat">
                    <span>👥 المستخدمون المفعلون:</span>
                    <span class="stat-value" id="activeUsers">0</span>
                </div>
                <div class="stat">
                    <span>🎯 الحد الأقصى للمستخدمين:</span>
                    <span class="stat-value" id="maxUsers">0</span>
                </div>
            </div>

            <div class="card">
                <h3>⚙️ إعدادات البوت</h3>
                <div class="input-group">
                    <label>🤖 Bot Token</label>
                    <input type="text" id="botToken" placeholder="أدخل توكن البوت">
                </div>
                <div class="input-group">
                    <label>👑 Admin Password</label>
                    <input type="text" id="adminPassword" placeholder="كلمة سر التفعيل">
                </div>
                <div class="input-group">
                    <label>📊 الحد الأقصى للمستخدمين</label>
                    <input type="number" id="maxUsersInput" placeholder="مثال: 20">
                </div>
                <button onclick="updateSettings()">💾 حفظ الإعدادات</button>
            </div>

            <div class="card">
                <h3>🔧 إدارة البوت</h3>
                <button onclick="toggleBot()" id="toggleBotBtn">✅ تفعيل البوت</button>
                <div class="warning" id="botStatus"></div>
            </div>

            <button class="logout-btn" onclick="logout()">🚪 خروج</button>
        </div>
    </div>

    <script>
        let adminAuthenticated = false;
        let botActive = false;

        function showMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        async function verifyAdmin() {
            const code = document.getElementById('adminCode').value;
            if (code === 'F5M-TEAM') {
                adminAuthenticated = true;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                await loadSettings();
                showMessage('✅ تم الدخول بنجاح', 'success');
            } else {
                showMessage('❌ كود المشرف غير صحيح', 'error');
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/get-settings');
                const data = await response.json();
                document.getElementById('botToken').value = data.token || '';
                document.getElementById('adminPassword').value = data.adminPassword || '';
                document.getElementById('maxUsersInput').value = data.maxUsers || 20;
                document.getElementById('activeUsers').textContent = data.activeUsers || 0;
                document.getElementById('maxUsers').textContent = data.maxUsers || 20;
                botActive = data.isActive || false;
                updateBotStatus();
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        async function updateSettings() {
            const settings = {
                token: document.getElementById('botToken').value,
                adminPassword: document.getElementById('adminPassword').value,
                maxUsers: parseInt(document.getElementById('maxUsersInput').value)
            };

            try {
                const response = await fetch('/api/update-settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                
                if (response.ok) {
                    showMessage('✅ تم تحديث الإعدادات بنجاح', 'success');
                    await loadSettings();
                }
            } catch (error) {
                showMessage('❌ فشل في تحديث الإعدادات', 'error');
            }
        }

        async function toggleBot() {
            try {
                const response = await fetch('/api/toggle-bot', {
                    method: 'POST'
                });
                const data = await response.json();
                botActive = data.isActive;
                updateBotStatus();
                showMessage(`✅ البوت ${botActive ? 'مفعل' : 'معطل'}`, 'success');
            } catch (error) {
                showMessage('❌ فشل في تغيير حالة البوت', 'error');
            }
        }

        function updateBotStatus() {
            const statusDiv = document.getElementById('botStatus');
            const toggleBtn = document.getElementById('toggleBotBtn');
            
            if (botActive) {
                statusDiv.innerHTML = '🟢 البوت مفعل ويعمل بشكل طبيعي';
                toggleBtn.textContent = '⏸️ تعطيل البوت';
                toggleBtn.style.background = 'linear-gradient(135deg, #ff6a00, #ff0000)';
            } else {
                statusDiv.innerHTML = '🔴 البوت معطل - قم بتفعيله لبدء العمل';
                toggleBtn.textContent = '▶️ تفعيل البوت';
                toggleBtn.style.background = 'linear-gradient(135deg, #00d4ff, #7b2ff7)';
            }
        }

        function logout() {
            adminAuthenticated = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminCode').value = '';
            showMessage('👋 تم تسجيل الخروج', 'success');
        }
    </script>
</body>
</html>
