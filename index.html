<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F5M-TEAM | لوحة تحكم البوت الأسطورية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a2a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: #fff;
            position: relative;
        }

        /* خلفية متحركة */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* شاشة الدخول */
        .login-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(75,0,130,0.8) 100%);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(255,140,0,0.3);
            border: 2px solid rgba(255,140,0,0.5);
            max-width: 500px;
            margin: 100px auto;
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .login-card h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00bfff, #8a2be2, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ff8c00;
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: #00bfff;
            box-shadow: 0 0 20px rgba(0,191,255,0.5);
        }

        .login-btn {
            background: linear-gradient(135deg, #8a2be2, #ff8c00);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,140,0,0.5);
        }

        /* لوحة التحكم */
        .dashboard {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(138,43,226,0.4) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,140,0,0.3);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ff8c00;
        }

        .stat-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 3.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #00bfff, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* بطاقات الإعدادات */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .setting-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,191,255,0.1) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0,191,255,0.3);
        }

        .setting-card h3 {
            color: #00bfff;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #ff8c00;
            padding-bottom: 10px;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            color: #ff8c00;
            font-weight: bold;
        }

        .setting-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #00bfff;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }

        .setting-input:focus {
            outline: none;
            border-color: #ff8c00;
            box-shadow: 0 0 10px rgba(255,140,0,0.3);
        }

        .save-btn {
            background: linear-gradient(135deg, #ff8c00, #ff6b00);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        .save-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,140,0,0.5);
        }

        /* قائمة المستخدمين */
        .users-section {
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(138,43,226,0.2) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ff8c00;
            border-radius: 10px;
            color: white;
            width: 250px;
        }

        .users-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: rgba(255,140,0,0.2);
            transform: translateX(5px);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: #00bfff;
            font-weight: bold;
        }

        .user-id {
            color: #ff8c00;
            font-size: 0.9em;
        }

        .user-date {
            color: #888;
            font-size: 0.8em;
        }

        .remove-user-btn {
            background: rgba(255,0,0,0.3);
            border: 1px solid #ff0000;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-user-btn:hover {
            background: rgba(255,0,0,0.6);
        }

        /* تنبيهات */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s;
            display: none;
        }

        .alert-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
        }

        .alert-error {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* سكرول مخصص */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8a2be2, #ff8c00);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <!-- شاشة الدخول -->
        <div id="loginScreen" class="login-card">
            <h1>⚡ F5M-TEAM ⚡</h1>
            <p style="color: #ff8c00; margin-bottom: 20px;">نظام التحكم الأسطوري</p>
            <input type="password" id="adminCode" class="login-input" placeholder="أدخل كود المدير">
            <button onclick="checkAdminCode()" class="login-btn">🚀 دخول</button>
            <div id="loginError" style="color: #ff4444; margin-top: 15px;"></div>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboard" class="dashboard">
            <h1 style="text-align: center; margin-bottom: 30px;">🎮 لوحة تحكم البوت الأسطورية</h1>
            
            <!-- الإحصائيات -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-number" id="activeUsersCount">0</div>
                    <div>مستخدم مفعل</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚙️</div>
                    <div class="stat-number" id="maxUsersCount">1000</div>
                    <div>الحد الأقصى</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-number" id="usagePercent">0%</div>
                    <div>نسبة الاستخدام</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🤖</div>
                    <div class="stat-number" id="botStatus">⚪</div>
                    <div>حالة البوت</div>
                </div>
            </div>

            <!-- إعدادات البوت -->
            <div class="settings-grid">
                <div class="setting-card">
                    <h3>🤖 إعدادات البوت</h3>
                    <div class="setting-group">
                        <label>📝 توكن البوت (Bot Token)</label>
                        <input type="text" id="botToken" class="setting-input" placeholder="أدخل توكن البوت من @BotFather">
                    </div>
                    <div class="setting-group">
                        <label>🔑 كلمة سر التفعيل</label>
                        <input type="text" id="activationPassword" class="setting-input" placeholder="كلمة السر لتفعيل البوت">
                    </div>
                    <div class="setting-group">
                        <label>📈 الحد الأقصى للمستخدمين</label>
                        <input type="number" id="maxUsers" class="setting-input" placeholder="الحد الأقصى" value="1000" min="1" max="10000">
                    </div>
                    <button onclick="saveBotSettings()" class="save-btn">💾 حفظ الإعدادات</button>
                </div>

                <div class="setting-card">
                    <h3>⚡ تحكم سريع</h3>
                    <div class="setting-group">
                        <label>🔘 تفعيل/تعطيل البوت</label>
                        <button onclick="toggleBotStatus()" id="toggleBotBtn" class="save-btn" style="background: linear-gradient(135deg, #00bfff, #0088cc);">🟢 تفعيل البوت</button>
                    </div>
                    <div class="setting-group">
                        <label>📢 إرسال إشعار للجميع</label>
                        <textarea id="notificationMessage" class="setting-input" rows="3" placeholder="أدخل رسالة الإشعار..."></textarea>
                        <button onclick="sendNotificationToAll()" class="save-btn" style="margin-top: 10px;">📨 إرسال الإشعار</button>
                    </div>
                </div>
            </div>

            <!-- قائمة المستخدمين -->
            <div class="users-section">
                <div class="users-header">
                    <h3>👥 المستخدمين المفعلين</h3>
                    <input type="text" id="searchUsers" class="search-box" placeholder="🔍 بحث عن مستخدم..." onkeyup="searchUsers()">
                </div>
                <div id="usersList" class="users-list">
                    <!-- سيتم عرض المستخدمين هنا -->
                </div>
            </div>
        </div>
    </div>

    <div id="alert" class="alert"></div>

    <script>
        // توليد النجوم
        for(let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        // البيانات الأساسية
        let botData = {
            botToken: '',
            activationPassword: 'F5M-TEAM',
            maxUsers: 1000,
            activeUsers: [],
            botActive: true
        };

        // تحميل البيانات
        function loadData() {
            const saved = localStorage.getItem('F5M_BOT_DATA');
            if(saved) {
                botData = JSON.parse(saved);
            } else {
                saveData();
            }
            updateDashboard();
        }

        // حفظ البيانات
        function saveData() {
            localStorage.setItem('F5M_BOT_DATA', JSON.stringify(botData));
            // مزامنة مع API
            syncWithAPI();
        }

        // مزامنة مع API
        async function syncWithAPI() {
            try {
                await fetch('/api/bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        command: 'sync',
                        adminCode: 'F5M-TEAM',
                        data: botData
                    })
                });
            } catch(e) {
                console.log('API sync error:', e);
            }
        }

        // التحقق من كود المدير
        function checkAdminCode() {
            const code = document.getElementById('adminCode').value;
            if(code === 'F5M-TEAM') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                showAlert('✅ تم الدخول بنجاح', 'success');
            } else {
                document.getElementById('loginError').innerText = '❌ كود المدير غير صحيح!';
            }
        }

        // تحديث لوحة التحكم
        function updateDashboard() {
            document.getElementById('activeUsersCount').innerText = botData.activeUsers.length;
            document.getElementById('maxUsersCount').innerText = botData.maxUsers;
            const percent = (botData.activeUsers.length / botData.maxUsers) * 100;
            document.getElementById('usagePercent').innerHTML = percent.toFixed(1) + '%';
            document.getElementById('botToken').value = botData.botToken;
            document.getElementById('activationPassword').value = botData.activationPassword;
            document.getElementById('maxUsers').value = botData.maxUsers;
            
            const statusText = botData.botActive ? '🟢 مفعل' : '🔴 غير مفعل';
            document.getElementById('botStatus').innerHTML = statusText;
            
            const toggleBtn = document.getElementById('toggleBotBtn');
            if(botData.botActive) {
                toggleBtn.innerHTML = '🔴 تعطيل البوت';
                toggleBtn.style.background = 'linear-gradient(135deg, #ff4444, #cc0000)';
            } else {
                toggleBtn.innerHTML = '🟢 تفعيل البوت';
                toggleBtn.style.background = 'linear-gradient(135deg, #00bfff, #0088cc)';
            }
            
            displayUsers();
        }

        // عرض المستخدمين
        function displayUsers() {
            const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            const filteredUsers = botData.activeUsers.filter(user => 
                user.username?.toLowerCase().includes(searchTerm) || 
                user.id?.toString().includes(searchTerm)
            );
            
            const usersList = document.getElementById('usersList');
            if(filteredUsers.length === 0) {
                usersList.innerHTML = '<div style="text-align: center; padding: 40px;">📭 لا يوجد مستخدمين مفعلين</div>';
                return;
            }
            
            usersList.innerHTML = filteredUsers.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">👤 ${user.username || 'مستخدم'}</div>
                        <div class="user-id">🆔 ${user.id}</div>
                        <div class="user-date">📅 ${new Date(user.activatedAt).toLocaleDateString('ar-EG')}</div>
                    </div>
                    <button class="remove-user-btn" onclick="removeUser('${user.id}')">🗑️ حذف</button>
                </div>
            `).join('');
        }

        // البحث في المستخدمين
        function searchUsers() {
            displayUsers();
        }

        // حفظ إعدادات البوت
        async function saveBotSettings() {
            const oldPassword = botData.activationPassword;
            const oldMaxUsers = botData.maxUsers;
            
            botData.botToken = document.getElementById('botToken').value;
            botData.activationPassword = document.getElementById('activationPassword').value;
            botData.maxUsers = parseInt(document.getElementById('maxUsers').value);
            
            saveData();
            updateDashboard();
            
            // إشعار المستخدمين إذا تغيرت كلمة السر
            if(oldPassword !== botData.activationPassword) {
                await notifyAllUsers('🔐 تم تغيير كلمة سر التفعيل! يرجى التواصل مع @abdou_F5M للحصول على كلمة السر الجديدة');
            }
            
            // إشعار إذا تغير الحد الأقصى
            if(oldMaxUsers !== botData.maxUsers) {
                await notifyAllUsers(`📊 تم تغيير الحد الأقصى للمستخدمين إلى ${botData.maxUsers}`);
            }
            
            showAlert('✅ تم حفظ الإعدادات بنجاح', 'success');
        }

        // تبديل حالة البوت
        function toggleBotStatus() {
            botData.botActive = !botData.botActive;
            saveData();
            updateDashboard();
            const status = botData.botActive ? 'مفعل' : 'غير مفعل';
            showAlert(`✅ تم ${status} البوت`, 'success');
        }

        // إزالة مستخدم
        async function removeUser(userId) {
            if(confirm('هل أنت متأكد من حذف هذا المستخدم؟')) {
                const user = botData.activeUsers.find(u => u.id == userId);
                botData.activeUsers = botData.activeUsers.filter(u => u.id != userId);
                saveData();
                updateDashboard();
                
                // إرسال إشعار للمستخدم المحذوف
                if(botData.botToken && user) {
                    await sendTelegramMessage(user.id, '⚠️ تم إلغاء تفعيل البوت الخاص بك من قبل المدير.');
                }
                
                showAlert('✅ تم حذف المستخدم بنجاح', 'success');
            }
        }

        // إرسال إشعار للجميع
        async function sendNotificationToAll() {
            const message = document.getElementById('notificationMessage').value;
            if(!message) {
                showAlert('❌ الرجاء إدخال رسالة الإشعار', 'error');
                return;
            }
            
            await notifyAllUsers(message);
            document.getElementById('notificationMessage').value = '';
            showAlert('✅ تم إرسال الإشعار للجميع', 'success');
        }

        // إشعار جميع المستخدمين
        async function notifyAllUsers(message) {
            if(!botData.botToken) {
                showAlert('⚠️ الرجاء إدخال توكن البوت أولاً', 'error');
                return;
            }
            
            let sentCount = 0;
            for(const user of botData.activeUsers) {
                const success = await sendTelegramMessage(user.id, `📢 <b>إشعار من المدير</b>\n\n${message}\n\n📞 للاستفسار: @abdou_F5M`);
                if(success) sentCount++;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            showAlert(`✅ تم إرسال الإشعار إلى ${sentCount} من ${botData.activeUsers.length} مستخدم`, 'success');
        }

        // إرسال رسالة تلجرام
        async function sendTelegramMessage(chatId, message) {
            if(!botData.botToken) return false;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${botData.botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                return data.ok;
            } catch(e) {
                console.error('Telegram error:', e);
                return false;
            }
        }

        // إظهار التنبيه
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // تحديث دوري من API
        setInterval(async () => {
            try {
                const response = await fetch('/api/bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: 'getData', adminCode: 'F5M-TEAM' })
                });
                const data = await response.json();
                if(data.success && data.data) {
                    botData = data.data;
                    saveData();
                    updateDashboard();
                }
            } catch(e) {}
        }, 5000);
    </script>
</body>
</html>
